<script>

let teams=[];
let showBeyond100=false;
let regionalMode=false;

let nationalityMode="core";

let continentMenuOpen=false;

let selectedContinent=null;

let selectedCountries=[];

let multiSelect=false;

let visibleContinent=null;

function determineFlag(players){

const countryCount={};
const continentCount={};

players.forEach(player=>{

const playerInfo=playerData[player];

if(!playerInfo) return;

const country=playerInfo.country;

countryCount[country]=(countryCount[country]||0)+1;

const countryInfo=countryData[country];

if(!countryInfo) return;

const continent=countryInfo.continent;

continentCount[continent]=(continentCount[continent]||0)+1;

});

for(const country in countryCount){

if(countryCount[country]>=3){
return country;
}

}

for(const continent in continentCount){

if(continentCount[continent]>=3){
return continent;
}

}

return "World";

}



function determineRegion(players){

const regionCount={};

players.forEach(player=>{

const playerInfo=playerData[player];

if(!playerInfo) return;

const countryInfo=countryData[playerInfo.country];

if(!countryInfo) return;

const region=countryInfo.vrs;

regionCount[region]=(regionCount[region]||0)+1;

});

let highestRegion="eu";
let highestCount=0;

for(const region in regionCount){

if(regionCount[region]>highestCount){

highestCount=regionCount[region];
highestRegion=region;

}

}

return highestRegion;

}

const coreBtn=
document.getElementById("coreBtn");

const playerBtn=
document.getElementById("playerBtn");

coreBtn.addEventListener("click",()=>{

nationalityMode="core";

coreBtn.classList.add("active");
playerBtn.classList.remove("active");

applyFilters();

});

playerBtn.addEventListener("click",()=>{

nationalityMode="player";

playerBtn.classList.add("active");
coreBtn.classList.remove("active");

applyFilters();

});

function buildCountryTree(){

const continents={};

teams.forEach(team=>{

team.players.forEach(player=>{

const info=playerData[player];

if(!info) return;

const country=info.country;

const countryInfo=
countryData[country];

if(!countryInfo) return;

const continent=
countryInfo.continent;

if(!continents[continent]){

continents[continent]=new Set();

}

continents[continent].add(country);

});

});

return continents;

}


document
.getElementById("continentsBtn")
.addEventListener("click",()=>{

const menu=
document.getElementById(
"continentMenu"
);

if(menu.style.display==="flex"){

menu.style.display="none";

document.getElementById(
"countryMenu"
).style.display="none";

return;

}

menu.style.display="flex";

const continents=
buildCountryTree();

menu.innerHTML=`
<div class="menu-header">

<div>
Continents
</div>

<div>

<button
class="close-menu"
id="multiSelectBtn"
>
${multiSelect?"✓":"+"}
</button>

<button
class="close-menu"
id="closeContinentMenu"
>
✕
</button>

</div>

</div>
`;

setTimeout(()=>{

document
.getElementById(
"multiSelectBtn"
)
.onclick=()=>{

multiSelect=!multiSelect;

document
.getElementById(
"multiSelectBtn"
).innerText=
multiSelect
?"✓"
:"+";

};

document
.getElementById(
"closeContinentMenu"
)
.onclick=()=>{

menu.style.display="none";

document
.getElementById(
"countryMenu"
).style.display="none";

};

});

const continentOrder=[
"Europe",
"North America",
"South America",
"Asia",
"Oceania",
"Africa",
"World"
];

continentOrder.forEach(continent=>{

if(continent==="World"){

const btn=
document.createElement("button");

btn.className=
"continent-btn";

btn.innerHTML=`
<img
class="menu-flag"
src="flags/World.svg"
>
World
`;

btn.onclick=()=>{

selectedContinent=null;
selectedCountries=[];

document
.querySelectorAll(".continent-btn")
.forEach(button=>{

button.classList.remove("active");

});

document
.querySelectorAll(".country-btn")
.forEach(button=>{

button.classList.remove("active");

});

updateNationalityButton();

applyFilters();

};

menu.appendChild(btn);

return;

}

if(!continents[continent]) return;

const btn=
document.createElement("button");

btn.className=
"continent-btn";

btn.innerHTML=`
<img
class="menu-flag"
src="flags/${continent}.svg"
>
${continent}
`;

btn.onclick=()=>{

const countryMenu=
document.getElementById(
"countryMenu"
);

const alreadyOpen=
visibleContinent===continent
&&
countryMenu.style.display==="flex";

if(!alreadyOpen){

visibleContinent=continent;

countryMenu.style.display=
"flex";

countryMenu.style.left=
"465px";

countryMenu.style.top=
"180px";

countryMenu.innerHTML=`
<div class="menu-header">

<div>
Countries
</div>

<button
class="close-menu"
id="closeCountryMenu"
>
✕
</button>

</div>
`;

setTimeout(()=>{

document
.getElementById(
"closeCountryMenu"
)
.onclick=()=>{

countryMenu.style.display=
"none";

};

});

[...continents[continent]]
.sort()
.forEach(country=>{

const countryBtn=
document.createElement(
"button"
);

countryBtn.className=
"country-btn";

countryBtn.innerHTML=`
<img
class="menu-flag"
src="flags/${country}.svg"
>
${country}
`;

countryBtn.onclick=()=>{

if(
selectedCountries.length===1
&&
selectedCountries[0]===country
){

selectedCountries=[];

document
.querySelectorAll(".country-btn")
.forEach(button=>{

button.classList.remove(
"active"
);

});

updateNationalityButton();

applyFilters();

return;

}

if(multiSelect){

if(selectedCountries.includes(country)){

selectedCountries=
selectedCountries.filter(
c=>c!==country
);

countryBtn.classList.remove(
"active"
);

}else{

selectedCountries.push(
country
);

countryBtn.classList.add(
"active"
);

}

selectedContinent=null;

updateNationalityButton();

applyFilters();

return;

}

document
.querySelectorAll(".country-btn")
.forEach(button=>{

button.classList.remove(
"active"
);

});

document
.querySelectorAll(".continent-btn")
.forEach(button=>{

button.classList.remove(
"active"
);

});

selectedCountries=[
country
];

selectedContinent=null;

countryBtn.classList.add(
"active"
);

updateNationalityButton();

applyFilters();

};

countryMenu.appendChild(
countryBtn
);

});

return;

}

selectedContinent=continent;

document
.querySelectorAll(".continent-btn")
.forEach(button=>{

button.classList.remove("active");

});

btn.classList.add("active");
selectedCountries=[];
updateNationalityButton();
applyFilters();
};

menu.appendChild(btn);

});

});

async function loadStandings(){

const response=
await fetch("standings_global_2026_06_01.md");

const markdown=
await response.text();

const lines=
markdown.split("\n");

teams=[];

for(const line of lines){

if(!line.startsWith("|"))
continue;

const cols=line
.split("|")
.map(x=>x.trim());

if(cols.length<6)
continue;

const rank=
parseInt(cols[1]);

const points=
parseInt(cols[2]);

if(isNaN(rank)||isNaN(points))
continue;

if(!showBeyond100 && rank > 100)
continue;

const sourceName=
cols[3];

const roster=
cols[4];

const players=
roster
.split(",")
.map(x=>x.trim());

const meta=
teamMeta[sourceName]||{};

teams.push({

rank,

points,

sourceName,

team:
meta.fullname||
sourceName,

players,

logo:
meta.logo||
"default.png",

color:
meta.color||
"#3b82f6",

rewriteFlag:
meta.rewriteFlag,

rewriteVRS:
meta.rewriteVRS

});

}

renderTeams();

}



function renderTeams(){

const rankings=
document.getElementById("rankings");

rankings.innerHTML="";

const regionalRanks={
eu:0,
am:0,
as:0
};

teams.forEach(team=>{

const autoFlag=
determineFlag(team.players);

const autoRegion=
determineRegion(team.players);

const flag=
team.rewriteFlag||
autoFlag;

const region=
team.rewriteVRS||
autoRegion;

const displayRank=
regionalMode
? ++regionalRanks[region]
: team.rank;

rankings.innerHTML+=`

<div
class="team-card"
data-region="${region}"
data-team-rank="${team.rank}"
style="--team-color:${team.color}"
>

<div class="team-main">

<div class="rank">
#${displayRank}
</div>

<div class="logo">
<img src="logos/${team.logo}">
</div>

<div class="team-info">

<div class="team-name-row">

<div class="team-name">
${team.team}
</div>

<img
class="team-flag"
src="flags/${flag}.svg"
title="${flag}"
>

<div class="points">
${team.points} pts
</div>

<div class="region-badge region-${region}">
${region==="eu"
?"EUROPE"
:region==="am"
?"AMERICA"
:"ASIA"}
</div>

</div>

<div class="roster">
${team.players
.map(player=>
playerData[player]?.nickname
||
player
)
.join(" • ")}
</div>
</div>

<div class="arrow">
▲
</div>

</div>

<div class="team-extra">

<div class="team-extra-grid">

${team.players.map(player=>{

const data=
playerData[player];

if(!data) return "";

const flagShown=
data.flagshown||
data.country;

const photo=
data.teamPhotos?.[team.team]
||
data.photo
||
"photos/default.png";

return`

<div class="player-card">

<div class="player-image">

<img
src="${photo}"
alt="${player}"
>

</div>

<div class="player-info">

<img
src="flags/${flagShown}.svg"
title="${flagShown}"
>

<div class="player-name">
${data.nickname || player}
</div>

</div>

</div>

`;

}).join("")}

</div>

</div>

</div>

`;

});

attachCardEvents();

}



function attachCardEvents(){

document
.querySelectorAll(".team-card")
.forEach(card=>{

card.addEventListener("click",()=>{

card.classList.toggle("open");

});

});

}



const activeRegions={

eu:true,
am:true,
as:true

};



document
.querySelectorAll(".filter-btn")
.forEach(button=>{

button.addEventListener("click",()=>{

const region=
button.dataset.region;

activeRegions[region]=
!activeRegions[region];

button.classList.toggle("active");

applyFilters();

});

});



document
.getElementById("searchInput")
.addEventListener("keyup",()=>{

applyFilters();

});



function teamMatchesNationality(team){

if(selectedCountries.length){

let count=0;

team.players.forEach(player=>{

const info=
playerData[player];

if(
selectedCountries.includes(
info?.country
)
){

count++;

}

});

return nationalityMode==="core"
? count>=3
: count>=1;

}

if(selectedContinent){

let count=0;

team.players.forEach(player=>{

const info=playerData[player];

if(!info) return;

const countryInfo=
countryData[info.country];

if(!countryInfo) return;

if(
countryInfo.continent===
selectedContinent
){

count++;

}

});

return nationalityMode==="core"
? count>=3
: count>=1;

}

return true;

}

function updateNationalityButton(){

const button=
document.getElementById(
"continentsBtn"
);

if(selectedCountries.length){

if(selectedCountries.length===1){

button.innerHTML=`
<img
class="menu-flag"
src="flags/${selectedCountries[0]}.svg"
>

${selectedCountries[0]}

<div class="sidebar-subtitle">
${nationalityMode==="core"
?"Core Mode"
:"Player Mode"}
</div>
`;

}else{

button.innerHTML=`
${selectedCountries.length} Countries

<div class="sidebar-subtitle">
${nationalityMode==="core"
?"Core Mode"
:"Player Mode"}
</div>
`;

}

return;

}

if(selectedContinent){

button.innerHTML=`
<img
class="menu-flag"
src="flags/${selectedContinent}.svg"
>

${selectedContinent}

<div class="sidebar-subtitle">
${nationalityMode==="core"
?"Core Mode"
:"Player Mode"}
</div>
`;

return;

}

button.innerHTML=`
Continents

<div class="sidebar-subtitle">
Select Region
</div>
`;

}

function applyFilters(){

const search=
document
.getElementById("searchInput")
.value
.toLowerCase();

let regionalRank=0;

document
.querySelectorAll(".team-card")
.forEach(card=>{

const matchesSearch=
card.innerText
.toLowerCase()
.includes(search);

const matchesRegion=
activeRegions[
card.dataset.region
];

const teamRank=
parseInt(
card.dataset.teamRank
);

const team=
teams.find(
t=>t.rank===teamRank
);

const matchesNationality=
team
? teamMatchesNationality(team)
: true;

const visible=
matchesSearch
&& matchesRegion
&& matchesNationality;

card.style.display=
visible
?"block"
:"none";

if(
regionalMode &&
visible &&
(
selectedCountries.length ||
selectedContinent
)
){

regionalRank++;

card.querySelector(
".rank"
).innerText=
"#"+regionalRank;

}

});

}

document
.getElementById("experimentalBtn")
.addEventListener("click",()=>{

showBeyond100=!showBeyond100;

const button=
document.getElementById("experimentalBtn");

button.innerHTML=
showBeyond100
? `Top 100 Only
<div class="sidebar-subtitle">
Default
</div>`
: `Beyond 100
<div class="sidebar-subtitle">
Experimental
</div>`;

loadStandings();

});

document
.getElementById("regionalBtn")
.addEventListener("click",()=>{

regionalMode=!regionalMode;

const button=
document.getElementById("regionalBtn");

button.innerHTML=
regionalMode
? `Global Rankings
<div class="sidebar-subtitle">
Regional Mode
</div>`
: `Regional Rankings
<div class="sidebar-subtitle">
Global Mode
</div>`;

renderTeams();

});

loadStandings();

</script>
</body>
