.topbar{

background:#161b22;

}

}

.coach-toggle.active{
background:#238636;

.team-logo{

height:36px;

}

.team-name{

.hidden{

.country{

.coach{

}

#teamsContainer{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(260px,1fr));
gap:20px;
margin-top:30px;
}

.team-card{
background:#182132;
border:1px solid rgba(255,255,255,.08);
border-radius:24px;
overflow:hidden;
}

.team-card-header{
display:flex;
align-items:center;
gap:10px;
padding:14px 16px;
border-bottom:1px solid rgba(255,255,255,.08);
font-weight:700;
}

.team-card-logo{
width:28px;
height:28px;
object-fit:contain;
}

.team-player-list{
padding:12px;
}

.player-row{
display:flex;
align-items:center;
gap:8px;
padding:8px 0;
font-weight:600;
}

.player-row.hidden{
justify-content:center;
color:#59657d;
letter-spacing:2px;
}

.player-row.found{
color:white;
}

.player-row.missed{
opacity:.5;
}

.player-flag{
width:18px;
height:13px;
object-fit:cover;
border-radius:2px;
}

.sub-label{
margin-left:6px;
font-size:11px;
color:#ffd700;
cursor:help;
font-weight:700;
}

#floatingSearch{
position:fixed;
top:12px;
left:50%;
transform:translateX(-50%);
z-index:9999;
display:none;
background:#182132;
padding:10px;
border-radius:20px;

}

#floatingInput{
width:320px;
padding:12px;
border:none;
border-radius:12px;

color:white;
outline:none;
}

let includeCoaches = false;
let gameOver = false;
let entries = [];
const foundPlayers = new Set();

const teamsContainer =
document.getElementById("teamsContainer");

const input =
document.getElementById("guessInput");

const floatingInput =
document.getElementById("floatingInput");

const inputRow =
document.querySelector(".input-row");

const floatingSearch =
document.getElementById("floatingSearch");

const foundCount =
document.getElementById("foundCount");

const totalCount =
document.getElementById("totalCount");

function buildEntries(){

entries = [];

teams.forEach(team=>{

team.players.forEach(player=>{

entries.push({
name:player.name,
aliases:player.aliases || [],
sub:player.sub || "",
team:team.team,
coach:false,
found:foundPlayers.has(player.name)
});

});

if(
includeCoaches &&
team.coach &&
team.coach.name
){

entries.push({
name:team.coach.name,
aliases:team.coach.aliases || [],
sub:team.coach.sub || "",
team:team.team,
coach:true,
found:foundPlayers.has(team.coach.name)
});

}

});

}

function render(){

buildEntries();

foundCount.textContent =
entries.filter(
e => e.found
).length;

totalCount.textContent =
entries.length;

teamsContainer.innerHTML = "";

teams.forEach(team=>{

const meta =
teamMeta[team.team] || {};

const card =
document.createElement("div");

card.className =
"team-card";

let html = `
<div class="team-card-header">

<img
class="team-card-logo"
src="logos/${meta.logo || ''}">

<div>
${meta.fullname || team.team}
</div>

</div>

<div class="team-player-list">
`;

team.players.forEach(player=>{

html += `
<div
class="player-row hidden"
id="player-${player.name}">
?????
</div>
`;

});

if(
includeCoaches &&
team.coach &&
team.coach.name
){

html += `
<div
class="player-row hidden coach-row"
id="player-${team.coach.name}">
Coach: ?????
</div>
`;

}

html += `
</div>
`;

card.innerHTML = html;

teamsContainer.appendChild(card);

});

/* RE-REVEAL ALREADY FOUND PLAYERS */

entries.forEach(entry=>{

if(entry.found){

revealPlayer(entry.name);

}

});

}

function revealPlayer(name,missed=false){

const row =
document.getElementById(
`player-${name}`
);

if(!row) return;

const pdata =
playerData[name];

const country =
pdata?.country || "";

const entry =
entries.find(
e => e.name === name
);

row.classList.remove(
"hidden"
);

row.classList.add(
missed
? "missed"
: "found"
);

let prefix = "";

if(entry?.coach){
prefix = "<strong>Coach:</strong> ";
}

row.innerHTML = `
${prefix}

<img
class="player-flag"
src="flags/${country}.svg"
title="${country}">

<span>
${name}
</span>

${
entry?.sub
?
`<span
class="sub-label"
title="${name} played instead of ${entry.sub}">
SUB
</span>`
:
''
}
`;

}

input.addEventListener(
"input",
()=>{

if(gameOver) return;

const guess =
input.value
.trim()
.toLowerCase();

entries.forEach(entry=>{

if(entry.found)
return;

const answers = [

entry.name
.toLowerCase(),

...(entry.aliases || [])
.map(
a =>
a.toLowerCase()
)

];

if(
answers.includes(
guess
)
){

entry.found =
true;
foundPlayers.add(entry.name);

revealPlayer(
entry.name
);

const found =
entries.filter(
e =>
e.found
).length;

foundCount.textContent =
found;

input.value = "";
floatingInput.value = "";

}

});

}
);

document
.getElementById(
"giveUpBtn"
)
.addEventListener(
"click",
()=>{

gameOver = true;

entries.forEach(
entry=>{

if(
!entry.found
){

revealPlayer(
entry.name,
true
);

}

}
);

}
);

document
.getElementById(
"coachToggle"
)
.addEventListener(
"click",
function(){

includeCoaches =
!includeCoaches;

this.classList.toggle(
"active"
);

render();

}
);

window.addEventListener(
"scroll",
()=>{

const rect =
inputRow.getBoundingClientRect();

if(rect.bottom < 0){

floatingSearch.style.display =
"block";

}else{

floatingSearch.style.display =
"none";

}

});

floatingInput.addEventListener(
"input",
()=>{

input.value =
floatingInput.value;

input.dispatchEvent(
new Event("input")
);

});

render();

</script>

</body>
</html>
