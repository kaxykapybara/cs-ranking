<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Swiss Simulator Test</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#0d1117;
color:white;
padding:30px;
}

.container{
max-width:1800px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:25px;
font-size:42px;
}

.swiss{
display:flex;
gap:28px;
align-items:flex-start;
overflow-x:auto;
padding-bottom:20px;
}

.column{
display:flex;
flex-direction:column;
gap:14px;
min-width:250px;
}

.column-title{
font-size:22px;
font-weight:700;
text-align:center;
margin-bottom:8px;
color:#8b949e;
}

.match{
background:#1b212b;
border-radius:14px;
overflow:hidden;
border:1px solid rgba(255,255,255,.06);
}

.team{
height:58px;
display:flex;
align-items:center;
gap:10px;
padding:0 14px;
border-bottom:1px solid rgba(255,255,255,.05);
background:#212936;
cursor:grab;
}

.team:last-child{
border-bottom:none;
}

.team img{
width:28px;
height:28px;
object-fit:contain;
}

.team span{
font-weight:700;
}

.placeholder{
height:58px;
display:flex;
align-items:center;
justify-content:center;
background:#212936;
color:#67758d;
font-weight:700;
}

.record-group{
display:flex;
flex-direction:column;
gap:10px;
}

.record-slot{
height:58px;
display:flex;
align-items:center;
justify-content:center;
background:#182132;
border:2px dashed #3a465b;
border-radius:14px;
font-weight:700;
color:#7c8798;
transition:.15s;
}

.record-slot.dragover{
border-color:#2ea043;
background:#203226;
color:white;
}

</style>
</head>
<body>

<div class="container">

<h1>Swiss Stage Prototype</h1>

<div id="swiss" class="swiss"></div>

</div>

<script src="swiss.js"></script>

</body>
</html>
