<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CS Off-Season</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#0d1117;
color:white;
padding:30px;
}

.container{
max-width:1500px;
margin:auto;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.left-nav{
display:flex;
align-items:center;
gap:12px;
}

.home-btn,
.nav-btn{
background:#161b22;
border:1px solid rgba(255,255,255,.05);
color:white;
padding:12px 18px;
border-radius:12px;
font-weight:700;
text-decoration:none;
cursor:pointer;
transition:.2s;
}

.home-btn:hover,
.nav-btn:hover{
background:#212936;
transform:translateY(-2px);
}

.team-card{
background:linear-gradient(180deg,#1b212b,#161b22);
border:1px solid rgba(255,255,255,.05);
border-radius:22px;
padding:45px;
overflow:hidden;
}

.team-header{
display:flex;
align-items:center;
gap:18px;
margin-bottom:35px;
}

.team-logo{
width:80px;
height:80px;
display:flex;
justify-content:center;
align-items:center;
}

.team-logo img{
max-width:100%;
max-height:100%;
object-fit:contain;
}

.team-name{
font-size:42px;
font-weight:700;
}

.players{
display:flex;
gap:18px;
margin-bottom:40px;
}

.player-column{
flex:1;
background:#212936;
border-radius:18px;
border:2px solid transparent;
padding:20px;
display:flex;
flex-direction:column;
align-items:center;
transition:.25s;
min-height:390px;
overflow:hidden;
}

.coach-column{
margin-left:40px;
background:#1d2430;
}

.coach-role{
margin-top:8px;
font-size:13px;
font-weight:600;
color:#8b949e;
letter-spacing:.5px;
text-transform:uppercase;
}

.player-column:hover{
transform:translateY(-4px);
}

.player-image{
width:100%;
height:310px;
background:#161b22;
border-radius:14px;
overflow:hidden;
position:relative;
display:flex;
justify-content:center;
align-items:flex-end;
margin-bottom:18px;
}

.player-photo{
position:absolute;
left:50%;
bottom:-125px;
transform:translateX(-50%) scale(1);
transform-origin:bottom center;
pointer-events:none;
user-select:none;
}

.player-name{
display:flex;
align-items:center;
justify-content:center;
gap:8px;
font-size:20px;
font-weight:700;
}

.player-flag{
width:22px;
height:16px;
border-radius:3px;
object-fit:cover;
}

.scan-btn{
display:block;
margin:auto;
padding:18px 42px;
background:#2563eb;
border:none;
border-radius:14px;
color:white;
font-size:18px;
font-weight:700;
cursor:pointer;
transition:.2s;
}

.scan-btn:hover{
background:#3b82f6;
transform:translateY(-2px);
}

.player-column.scanning{
background:#2563eb;
}

.player-column.leave,
.team-card.leave{
background:#dc2626;
}

.player-column.stay{
background:#16a34a;
}

.team-card.stay{
background:#0f6d32;
}

#rouletteOverlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
display:none;
justify-content:center;
align-items:center;
z-index:99999;
backdrop-filter:blur(6px);
}

#rouletteWindow{
width:500px;
background:#161b22;
border-radius:18px;
padding:25px;
border:1px solid rgba(255,255,255,.08);
}

.rouletteTitle{
font-size:26px;
font-weight:700;
text-align:center;
margin-bottom:20px;
}

#rouletteViewport{
height:300px;
overflow:hidden;
background:#0d1117;
border-radius:12px;
position:relative;
}

#rouletteViewport::after{
content:"";
position:absolute;
left:0;
right:0;
top:125px;
height:50px;
border-top:2px solid #3b82f6;
border-bottom:2px solid #3b82f6;
box-shadow:0 0 30px rgba(59,130,246,.7);
background:rgba(59,130,246,.08);
pointer-events:none;
}

#rouletteList{
transition:transform 5s cubic-bezier(.15,.8,.15,1);
}

.roulettePlayer{
height:50px;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
font-size:18px;
font-weight:700;
}

.roulettePlayer img{
width:22px;
height:16px;
border-radius:3px;
}

.roulettePlayer{
height:50px;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
font-size:18px;
font-weight:700;
opacity:.35;
transition:.25s;
}

.roulettePlayer.active{
opacity:1;
color:white;
font-size:22px;
font-weight:800;
text-shadow:0 0 14px #2563eb;
}

#signingOverlay{
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,.82);
backdrop-filter:blur(6px);
z-index:100000;
}

#signingCard{
background:linear-gradient(180deg,#1b212b,#161b22);
border:1px solid rgba(255,255,255,.08);
border-radius:24px;
padding:45px;
width:520px;
text-align:center;
box-shadow:0 25px 70px rgba(0,0,0,.6);
animation:signAppear .35s;
}

.team-card.scanning{
background:#2563eb;
}

#signingCard img{
width:320px;
height:380px;
object-fit:contain;
filter:drop-shadow(0 18px 30px rgba(0,0,0,.45));
}

#signingName{
margin-top:18px;
font-size:42px;
font-weight:800;
}

.signingLabel{
margin-top:8px;
font-size:15px;
font-weight:700;
letter-spacing:5px;
color:#3b82f6;
text-transform:uppercase;
}

@keyframes signAppear{
from{
opacity:0;
transform:scale(.8);
}
to{
opacity:1;
transform:scale(1);
}
}

.team-card.disband{

background:#dc2626;

}

.team-card.flyaway{

transition:transform 1.8s cubic-bezier(.2,.9,.2,1),
opacity 1.8s;

transform:
translate(120vw,-120vh)
rotate(35deg)
scale(.5);

opacity:0;

}

</style>

<script src="players.js"></script>
<script src="teammeta.js"></script>
<script src="offseasondata.js"></script>

</head>

<body>

<div class="container">

<div class="topbar">

<div class="left-nav">

<a href="index.html" class="home-btn">
← Home
</a>

<button class="nav-btn" id="prevBtn">
◀
</button>

</div>

<button class="nav-btn" id="nextBtn">
▶
</button>

</div>

<div class="team-card">

<div class="team-header">

<div class="team-logo">
<img id="teamLogo">
</div>

<div class="team-name" id="teamName"></div>

</div>

<div class="players" id="players"></div>

<button class="scan-btn" id="scanBtn">
Scan Roster
</button>

</div>

</div>

<script>

let currentTeam=0;
let scanState=[];

function renderTeam(){

const team=offseasonData[currentTeam];
const meta=teamMeta[team.team];

document.getElementById("teamLogo").src="logos/"+meta.logo;
document.getElementById("teamName").innerText=meta.fullname;

const players=document.getElementById("players");
players.innerHTML="";

team.players.forEach((slot,index)=>{

let playerName=typeof slot==="string"
?slot
:slot.player;

const player=playerData[playerName];

const isCoach=index===team.players.length-1;

players.innerHTML+=`

<div
class="player-column ${isCoach?"coach-column":""}"
id="player-${index}"
>

<div class="player-image">

<img
class="player-photo"
src="${player.photo}"
>

</div>

<div class="player-name">

<img
class="player-flag"
src="flags/${player.country}.svg"
>

${playerName}

</div>

${isCoach?'<div class="coach-role">Coach</div>':""}

</div>

`;

});

scanState.forEach((state,i)=>{

if(!state) return;

const card=document.getElementById("player-"+i);

if(card)
card.classList.add(state);

});

}

function sleep(ms){
return new Promise(resolve=>setTimeout(resolve,ms));
}

async function showSigning(player,index){

const overlay=document.getElementById("signingOverlay");

overlay.style.display="flex";
document.getElementById("signingLabel").innerText="NEW SIGNING";

document.getElementById("signingPhoto").src=
playerData[player].photo;

document.getElementById("signingName").innerText=
player;

await sleep(2500);

overlay.style.display="none";

document.getElementById("rouletteOverlay").style.display="none";

await sleep(1200);

const team=offseasonData[currentTeam];

team.players[index]=player;
scanState[index]="stay";

renderTeam();

}

async function scanRoster(){

const team=offseasonData[currentTeam];

if(team.disband){

    await showDisband(team);
    return;

}

console.log(team);
console.log(team.replacementTeam);

console.log(team);

if(team.replacementTeam){

    console.log("TEAM TAKEOVER!");

    await showTeamTakeover(team);

}

for(let i=0;i<team.players.length;i++){

const cards=document.querySelectorAll(".player-column");

cards[i].classList.add("scanning");

await sleep(1200);

cards[i].classList.remove("scanning");

const slot=team.players[i];

if(typeof slot==="object"){
cards[i].classList.add("leave");
scanState[i]="leave";

await sleep(1000);

await showRoulette(slot.replacement,team,i);

await sleep(700);

const newCards=document.querySelectorAll(".player-column");

newCards[i].classList.add("stay");

await sleep(900);
}else{
cards[i].classList.add("stay");
scanState[i]="stay";
}

}

document.querySelector(".team-card").classList.remove("stay");

}

function showRoulette(winner,team,index){

return new Promise(resolve=>{

const overlay=document.getElementById("rouletteOverlay");
const list=document.getElementById("rouletteList");

overlay.style.display="flex";
list.innerHTML="";

const teammates=[];

team.players.forEach(slot=>{

teammates.push(typeof slot=="string"?slot:slot.player);

});

const pool=[];

const replacingCoach=index===team.players.length-1;

offseasonData.forEach(t=>{

t.players.forEach((slot,i)=>{

const isCoach=i===t.players.length-1;

if(replacingCoach!==isCoach) return;

const name=typeof slot=="string"
?slot
:slot.player;

if(teammates.includes(name)) return;

if(name===winner) return;

pool.push(name);

});

});

const entries=[];

for(let i=0;i<4;i++){

const shuffled=[...pool].sort(()=>Math.random()-.5);

entries.push(...shuffled);

}

const stopIndex=entries.length-25-Math.floor(Math.random()*20);

entries.splice(stopIndex,0,winner);

let html="";

entries.forEach(name=>{

    const player=playerData[name];

    if(!player) return;

    html+=`
    <div class="roulettePlayer">
        <img src="flags/${player.country}.svg">
        ${name}
    </div>
    `;

});

list.innerHTML=html;

list.style.transition="none";
list.style.transform="translateY(0px)";

const highlight=setInterval(()=>{

const transform=getComputedStyle(list).transform;

if(transform==="none") return;

const values=transform.match(/matrix.*\((.+)\)/);

if(!values) return;

const y=Math.abs(parseFloat(values[1].split(",")[5]));

const current=Math.round((y+125)/50);

document
.querySelectorAll(".roulettePlayer")
.forEach((player,index)=>{

player.classList.toggle(
"active",
index===current
);

});

},20);

setTimeout(()=>{

const offset=Math.random()*40-20;

const duration=8+Math.random()*3;

const easings=[
"cubic-bezier(.05,.95,.15,1)",
"cubic-bezier(.08,.92,.18,1)",
"cubic-bezier(.04,.98,.12,1)",
"cubic-bezier(.10,.90,.20,1)"
];

const easing=easings[
Math.floor(Math.random()*easings.length)
];

list.style.transition=
`transform ${duration}s ${easing}`;

list.style.transform=
`translateY(-${stopIndex*50-125+offset}px)`;

setTimeout(async()=>{

clearInterval(highlight);

list.style.transition="transform .25s ease-out";
list.style.transform=
`translateY(-${stopIndex*50-125}px)`;

await sleep(250);
await sleep(2000);

await showSigning(winner,index);

resolve();

},duration*1000);

},50);

});

}

async function showTeamRoulette(team){

return new Promise(resolve=>{

const overlay=document.getElementById("rouletteOverlay");
const title=document.querySelector(".rouletteTitle");
const list=document.getElementById("rouletteList");

title.innerText="Searching New Organisation";

overlay.style.display="flex";
list.innerHTML="";

const entries=[];

const teams=Object.keys(teamMeta);

for(let i=0;i<4;i++){

const shuffled=[...teams].sort(()=>Math.random()-.5);

entries.push(...shuffled);

}

const stopIndex=entries.length-25-Math.floor(Math.random()*20);

entries.splice(stopIndex,0,team.replacementTeam);

let html="";

entries.forEach(name=>{

html+=`
<div class="roulettePlayer">
<img src="logos/${teamMeta[name].logo}">
${teamMeta[name].fullname}
</div>
`;

});

list.innerHTML=html;

list.style.transition="none";
list.style.transform="translateY(0px)";

const highlight=setInterval(()=>{

const transform=getComputedStyle(list).transform;

if(transform==="none") return;

const values=transform.match(/matrix.*\((.+)\)/);

if(!values) return;

const y=Math.abs(parseFloat(values[1].split(",")[5]));

const current=Math.round((y+125)/50);

document
.querySelectorAll(".roulettePlayer")
.forEach((player,index)=>{

player.classList.toggle("active",index===current);

});

},20);

setTimeout(()=>{

const duration=8+Math.random()*3;

const offset=Math.random()*40-20;

list.style.transition=
`transform ${duration}s cubic-bezier(.08,.92,.18,1)`;

list.style.transform=
`translateY(-${stopIndex*50-125+offset}px)`;

setTimeout(async()=>{

clearInterval(highlight);

list.style.transition="transform .25s ease-out";
list.style.transform=
`translateY(-${stopIndex*50-125}px)`;

await sleep(250);

await showOrganisationSigning(team.replacementTeam);

overlay.style.display="none";

title.innerText="Signing Replacement";

resolve();

},duration*1000);

},50);

});

}

async function showDisband(team){

const card=document.querySelector(".team-card");

card.classList.add("scanning");

await sleep(1200);

card.classList.remove("scanning");

card.classList.add("leave");

await sleep(1000);

card.classList.remove("leave");
card.classList.add("disband");

await sleep(700);

card.classList.add("flyaway");

await sleep(1800);

}

async function showOrganisationSigning(teamName){

const overlay=document.getElementById("signingOverlay");

document.getElementById("signingPhoto").src=
"logos/"+teamMeta[teamName].logo;

document.getElementById("signingName").innerText=
teamMeta[teamName].fullname;

document.querySelector(".signingLabel").innerText=
"NEW ORGANISATION";

overlay.style.display="flex";

await sleep(2500);

overlay.style.display="none";

document.querySelector(".signingLabel").innerText=
"NEW SIGNING";

}

async function showTeamTakeover(team){

const card=document.querySelector(".team-card");

// Blue scan
card.classList.add("scanning");

await sleep(1200);

card.classList.remove("scanning");

// Red
card.classList.add("leave");

await sleep(1000);

// Spin organisations
await showTeamRoulette(team);

// Change organisation
team.team=team.replacementTeam;

scanState=[];

renderTeam();

// New card after render
const newCard=document.querySelector(".team-card");

newCard.classList.remove("leave");
newCard.classList.remove("scanning");

newCard.classList.add("stay");

await sleep(1800);

// Don't remove stay yet

}

document.getElementById("prevBtn").onclick=()=>{

currentTeam--;

if(currentTeam<0)
currentTeam=offseasonData.length-1;

scanState=[];

document
.querySelector(".team-card")
.classList.remove("flyaway","disband","leave","scanning","stay");

renderTeam();

};

document.getElementById("nextBtn").onclick=()=>{

currentTeam++;

if(currentTeam>=offseasonData.length)
currentTeam=0;

scanState=[];

document
.querySelector(".team-card")
.classList.remove("flyaway","disband","leave","scanning","stay");

renderTeam();

};

document.getElementById("scanBtn").onclick=scanRoster;

renderTeam();

</script>

<div id="rouletteOverlay">

<div id="rouletteWindow">

<div class="rouletteTitle">
Signing Replacement
</div>

<div id="rouletteViewport">

<div id="rouletteList"></div>

</div>

</div>

</div>

<div id="signingOverlay">

<div id="signingCard">

<img id="signingPhoto">

<div id="signingName"></div>

<div class="signingLabel" id="signingLabel">
NEW SIGNING
</div>

</div>

</div>

</body>
</html>
