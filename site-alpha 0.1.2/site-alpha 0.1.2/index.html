<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#0d1117;
color:white;
padding:30px;
}

.container{
max-width:1100px;
margin:auto;
}



.header{
display:flex;
justify-content:space-between;
align-items:flex-start;
margin-bottom:25px;
gap:20px;
}

.left-side{
display:flex;
flex-direction:column;
}



.title{
font-size:36px;
font-weight:700;
}

.subtitle{
font-size:13px;
color:#8b949e;
margin-top:5px;
}



.filters{
display:flex;
gap:12px;
margin-top:18px;
}

.filter-btn{
padding:8px 18px;
border-radius:999px;
font-size:13px;
font-weight:700;
cursor:pointer;
transition:.2s;
border:none;
color:white;
opacity:.65;
}

.filter-btn:hover{
opacity:1;
transform:translateY(-1px);
}

.filter-btn.active{
opacity:1;
}

.filter-eu{
background:#2563eb;
box-shadow:0 0 14px rgba(37,99,235,.55);
}

.filter-am{
background:#dc2626;
box-shadow:0 0 14px rgba(220,38,38,.55);
}

.filter-as{
background:#eab308;
color:black;
box-shadow:0 0 14px rgba(234,179,8,.55);
}



.search{
background:#161b22;
border:none;
outline:none;
padding:12px 16px;
border-radius:10px;
color:white;
width:260px;
font-size:14px;
height:45px;
}



.rankings{
display:flex;
flex-direction:column;
gap:12px;
}



.team-card{
position:relative;
background:linear-gradient(180deg,#1b212b,#161b22);
border-radius:14px;
border:1px solid rgba(255,255,255,.05);
overflow:hidden;
transition:.3s;
cursor:pointer;
}

.team-card:hover{
transform:translateY(-2px);
background:#202734;
box-shadow:0 8px 25px rgba(0,0,0,.4);
}

.team-card::before{
content:"";
position:absolute;
left:0;
top:0;
width:4px;
height:100%;
background:var(--team-color);
box-shadow:0 0 12px var(--team-color);
}



.team-main{
display:flex;
align-items:center;
padding:18px 22px;
min-height:108px;
}



.rank{
width:60px;
font-size:24px;
font-weight:700;
color:#b4bcc8;
}



.logo{
width:70px;
height:70px;
margin-right:24px;
display:flex;
align-items:center;
justify-content:center;
}

.logo img{
max-width:100%;
max-height:100%;
object-fit:contain;
}



.team-info{
flex:1;
}

.team-name-row{
display:flex;
align-items:center;
gap:10px;
margin-bottom:6px;
}

.team-name{
font-size:24px;
font-weight:700;
}

.team-flag{
width:24px;
height:17px;
object-fit:cover;
border-radius:4px;
}

.points{
font-size:14px;
color:#8fa4c7;
}

.roster{
font-size:13px;
color:#7d8590;
transition:.25s;
}

.team-card.open .roster{
opacity:0;
max-height:0;
overflow:hidden;
margin-top:-6px;
}



.region-badge{
margin-left:auto;
padding:6px 12px;
border-radius:999px;
font-size:11px;
font-weight:800;
letter-spacing:.6px;
color:white;
}

.region-eu{
background:#2563eb;
box-shadow:0 0 12px rgba(37,99,235,.5);
}

.region-am{
background:#dc2626;
box-shadow:0 0 12px rgba(220,38,38,.5);
}

.region-as{
background:#eab308;
color:black;
box-shadow:0 0 12px rgba(234,179,8,.5);
}



.arrow{
font-size:18px;
color:#8b949e;
margin-left:18px;
transition:.3s;
}

.team-card.open .arrow{
transform:rotate(180deg);
}



.team-extra{
max-height:0;
overflow:hidden;
opacity:0;
transition:.35s ease;
}

.team-card.open .team-extra{
max-height:520px;
opacity:1;
padding:0 22px 22px 22px;
}



.team-extra-grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:16px;
margin-top:4px;
width:100%;
}



.player-card{
background:#11161f;
border:1px solid rgba(255,255,255,.05);
border-radius:16px;
overflow:hidden;
transition:.25s;
}

.player-card:hover{
transform:translateY(-4px);
box-shadow:0 10px 24px rgba(0,0,0,.45);
}



.player-image{
height:175px;
background:#0b1017;
overflow:hidden;
position:relative;
display:flex;
align-items:flex-start;
justify-content:center;
}

.player-image img{
width:100%;
height:auto;
object-fit:contain;
object-position:center top;
transform:scale(1.36) translateY(30px);
filter:drop-shadow(0 10px 20px rgba(0,0,0,.45));
}



.player-info{
padding:12px;
display:flex;
align-items:center;
gap:8px;
justify-content:center;
}

.player-info img{
width:18px;
height:13px;
object-fit:cover;
border-radius:3px;
flex-shrink:0;
}

.player-name{
font-size:15px;
font-weight:700;
color:white;
}

</style>

</head>

function determineFlag(players){

const countryCount={};
const continentCount={};

players.forEach(player=>{

const playerInfo=playerData[player];

if(!playerInfo) return;

const country=playerInfo.country;

if(!country) return;

countryCount[country]=(countryCount[country]||0)+1;

const countryInfo=countryData[country];

if(!countryInfo) return;

const continent=countryInfo.continent;

continentCount[continent]=(continentCount[continent]||0)+1;

});


for(const country in countryCount){

if(countryCount[country]>=3){
return country;
}

}


for(const continent in continentCount){

if(continentCount[continent]>=3){
return continent;
}

}


return "World";

}



function determineRegion(players){

const regionCount={};

players.forEach(player=>{

const playerInfo=playerData[player];

if(!playerInfo) return;

const countryInfo=countryData[playerInfo.country];

if(!countryInfo) return;

const region=countryInfo.vrs;

regionCount[region]=(regionCount[region]||0)+1;

});


let highestRegion="eu";
let highestCount=0;

for(const region in regionCount){

if(regionCount[region]>highestCount){

highestCount=regionCount[region];
highestRegion=region;

}

}

return highestRegion;

}

const rankings=document.getElementById("rankings");

teams.forEach(team=>{

const autoFlag=determineFlag(team.players);
const autoRegion=determineRegion(team.players);

const flag=team.rewriteFlag || autoFlag;
const region=team.rewriteVRS || autoRegion;

rankings.innerHTML+=`

<div
class="team-card"
data-region="${region}"
style="--team-color:${team.color}"
>

<div class="team-main">

<div class="rank">
#${team.rank}
</div>

<div class="logo">
<img src="logos/${team.logo}">
</div>

<div class="team-info">

<div class="team-name-row">

<div class="team-name">
${team.team}
</div>

<img
class="team-flag"
src="flags/${flag}.svg"
title="${flag}"
>

<div class="points">
${team.points} pts
</div>

<div class="region-badge region-${region}">
${region==="eu"
?"EUROPE"
:region==="am"
?"AMERICA"
:"ASIA"}
</div>

</div>

<div class="roster">
${team.players.join(" • ")}
</div>

</div>

<div class="arrow">
▲
</div>

</div>



<div class="team-extra">

<div class="team-extra-grid">

${team.players.map(player=>{

const data=playerData[player];

if(!data) return "";

const photo=
data.teamPhotos?.[team.team]
|| data.photo
|| "ps/default.png";

const shownFlag=
data.flagshown
|| data.country;

return`

<div class="player-card">

<div class="player-image">
<img src="${photo}">
</div>

<div class="player-info">

<img
src="flags/${shownFlag}.svg"
title="${shownFlag}"
>

<div class="player-name">
${player}
</div>

</div>

</div>

`;

}).join("")}

</div>

</div>


</div>

</div>

</div>

`;

});



document.querySelectorAll(".team-card").forEach(card=>{

card.addEventListener("click",(e)=>{

if(
e.target.classList.contains("filter-btn") ||
e.target.id==="searchInput"
){
return;
}

card.classList.toggle("open");

});

});



const activeRegions={
eu:true,
am:true,
as:true
};



function updateFilters(){

const cards=document.querySelectorAll(".team-card");

cards.forEach(card=>{

const matchesSearch=
card.innerText
.toLowerCase()
.includes(searchInput.value.toLowerCase());

const matchesRegion=
activeRegions[card.dataset.region];

card.style.display=
(matchesSearch && matchesRegion)
?"block"
:"none";

});

}



const searchInput=document.getElementById("searchInput");

searchInput.addEventListener("keyup",()=>{

updateFilters();

});



document.querySelectorAll(".filter-btn").forEach(button=>{

button.addEventListener("click",(e)=>{

e.stopPropagation();

const region=button.dataset.region;

activeRegions[region]=!activeRegions[region];

button.classList.toggle("active");

updateFilters();

});

});

</script>
