<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Major Nationalities Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="../teammeta.js"></script>
<script src="../players.js"></script>
<script src="../countries.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#0d1117;
color:white;
padding:30px;
}

.container{
max-width:1400px;
margin:auto;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
flex-wrap:wrap;
gap:10px;
}

.back-btn{
background:#161b22;
padding:10px 16px;
border-radius:10px;
text-decoration:none;
color:white;
font-weight:700;
}

.back-btn:hover{
background:#212936;
}

.coach-toggle{
background:#212936;
padding:10px 16px;
border-radius:10px;
cursor:pointer;
font-weight:700;
user-select:none;
}

.coach-toggle.active{
background:#238636;
}

.card{
background:linear-gradient(180deg,#1b212b,#161b22);
border:1px solid rgba(255,255,255,.05);
border-radius:18px;
padding:30px;
}

h1{
text-align:center;
font-size:40px;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#8b949e;
margin-bottom:25px;
}

.stats{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:25px;
}

.stat{
background:#212936;
padding:12px 18px;
border-radius:12px;
font-weight:700;
}

.input-row{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:30px;
flex-wrap:wrap;
}

input{
width:350px;
padding:14px;
border:none;
border-radius:12px;
background:#212936;
color:white;
font-size:16px;
outline:none;
}

.giveup-btn{
background:#da3633;
color:white;
border:none;
padding:14px 18px;
border-radius:12px;
font-weight:700;
cursor:pointer;
}

.team-header{
display:flex;
align-items:center;
gap:12px;
margin-bottom:12px;
padding-bottom:10px;
border-bottom:1px solid rgba(255,255,255,.08);
}

.team-logo{
width:36px;
height:36px;
object-fit:contain;
}

.team-name{
font-size:22px;
font-weight:700;
}

.hidden{
color:#4b5563;
letter-spacing:2px;
}

.country{
display:block;
font-size:12px;
margin-top:4px;
opacity:.8;
}

.coach{
display:block;
font-size:11px;
margin-top:4px;
color:#ffd700;
}

#teamsContainer{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));
gap:18px;
margin-top:30px;
}

.country-card{

background:#182132;
border:1px solid rgba(255,255,255,.08);
border-radius:12px;
padding:12px 16px;

display:flex;
align-items:center;
gap:10px;

}

.country-flag{

width:22px;
height:16px;
object-fit:cover;
border-radius:2px;
flex-shrink:0;

}

.country-answer{

font-size:18px;
font-weight:600;

}

.country-answer.hidden{

color:#59657d;
letter-spacing:2px;

}

.country-answer.found{

color:white;
letter-spacing:0;

}

.country-answer.missed{

opacity:.5;

}

.country-answer.found{
letter-spacing:0;
color:white;
}

.country-answer.missed{
letter-spacing:0;
opacity:.5;
color:white;
}

#floatingSearch{
position:fixed;
top:12px;
left:50%;
transform:translateX(-50%);
z-index:9999;
display:none;
background:#182132;
padding:10px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.5);
}

#floatingInput{
width:320px;
padding:12px;
border:none;
border-radius:12px;
background:#212936;
color:white;
outline:none;
}

.tryagain-btn{
background:#238636;
color:white;
border:none;
padding:14px 18px;
border-radius:12px;
font-weight:700;
cursor:pointer;
}

#winScreen{
position:fixed;
inset:0;
background:rgba(0,0,0,.85);
display:none;
justify-content:center;
align-items:center;
z-index:10000;
backdrop-filter:blur(8px);
}

.win-content{
position:relative;
background:#182132;
padding:40px;
border-radius:24px;
text-align:center;
animation:winPop .4s ease;
box-shadow:
0 0 40px rgba(35,134,54,.4);
}

.close-win{
position:absolute;
top:10px;
right:10px;
background:none;
border:none;
color:#8b949e;
font-size:24px;
cursor:pointer;
font-weight:700;
}

.win-content h2{
font-size:42px;
margin-bottom:12px;
}

.win-content p{
color:#8b949e;
margin-bottom:20px;
font-size:18px;
}

#winTryAgain{
background:#238636;
color:white;
border:none;
padding:14px 20px;
border-radius:12px;
font-weight:700;
cursor:pointer;
}

@keyframes winPop{

from{
transform:scale(.8);
opacity:0;
}

to{
transform:scale(1);
opacity:1;
}

}

</style>
</head>
<body>

<div class="container">

<div class="topbar">

<a href="major-nationalities.html" class="back-btn">
← Back
</a>

<div id="coachToggle" class="coach-toggle">
Include Coaches
</div>

</div>

<div class="card">

<h1>..Loading</h1>

<div class="subtitle">
Guess every nationality
</div>

<div class="stats">
<div class="stat">
Found: <span id="foundCount">0</span> /
<span id="totalCount">0</span>
</div>
</div>

<div class="input-row">

<input
id="guessInput"
placeholder="Type country..."
autocomplete="off"
>

<button id="giveUpBtn" class="giveup-btn">
Give Up
</button>

<button
id="tryAgainBtn"
class="tryagain-btn"
style="display:none;">
Try Again
</button>

</div>

<div id="teamsContainer"></div>

<div id="floatingSearch">

<input
id="floatingInput"
placeholder="Type country..."
autocomplete="off"
>

</div>

</div>

</div>

<div id="winScreen">

<div class="win-content">

<button
id="closeWinScreen"
class="close-win">
✕
</button>

<h2>
🏆 Major Cleared
</h2>

<p id="winStats"></p>

<button id="winTryAgain">
Try Again
</button>

</div>

</div>

<script>

let teams = [];

let includeCoaches = false;
let gameOver = false;
let giveUpConfirm = false;
let entries = [];
const foundPlayers = new Set();

const teamsContainer =
document.getElementById("teamsContainer");

const input =
document.getElementById("guessInput");

const floatingInput =
document.getElementById("floatingInput");

const inputRow =
document.querySelector(".input-row");

const floatingSearch =
document.getElementById("floatingSearch");

const foundCount =
document.getElementById("foundCount");

const totalCount =
document.getElementById("totalCount");

function buildEntries(){

entries = [];

const countryMap = {};

teams.forEach(team=>{

team.players.forEach(player=>{

const pdata = playerData[player.name];

if(!pdata) return;

const shownCountry =
pdata.flagshown || pdata.country;

const answerCountry =
pdata.country;

if(!countryMap[shownCountry]){

countryMap[shownCountry]={
name:shownCountry,
count:0,
answers:[],
players:[]
};

}

countryMap[shownCountry].count++;

countryMap[shownCountry].answers.push(
answerCountry
);

countryMap[shownCountry].players.push(
player.name
);

});

if(
includeCoaches &&
team.coach &&
team.coach.name &&
team.coach.name !== "-"
){

const pdata =
playerData[team.coach.name];

if(!pdata) return;

const shownCountry =
pdata.flagshown || pdata.country;

const answerCountry =
pdata.country;

if(!countryMap[shownCountry]){

countryMap[shownCountry]={
name:shownCountry,
count:0,
answers:[],
players:[]
};

}

countryMap[shownCountry].count++;

countryMap[shownCountry].answers.push(
answerCountry
);

countryMap[shownCountry].players.push(
team.coach.name
);

}

});

entries = Object.values(countryMap)
.sort((a,b)=>

b.count-a.count ||

a.name.localeCompare(b.name)

)
.map(country=>({

name:country.name,

count:country.count,

answers:country.answers,

players:
country.players.sort(
(a,b)=>
a.localeCompare(
b,
undefined,
{sensitivity:"base"}
)
),

found:
foundPlayers.has(country.name)

}));

}

function render(){

buildEntries();

foundCount.textContent =
entries.filter(
e => e.found
).length;

totalCount.textContent =
entries.length;

teamsContainer.innerHTML = "";

entries.forEach(entry=>{

const card =
document.createElement("div");

card.className =
"country-card";

card.innerHTML = `

<img
class="country-flag"
id="flag-${entry.name}"
style="display:none;">

<div
class="country-answer ${entry.found?"found":"hidden"}"
id="country-${entry.name}">

${entry.found
? `<strong>${entry.name}</strong> (${entry.count})`
: `?????? (${entry.count})`
}

</div>

`;

teamsContainer.appendChild(card);

});

entries.forEach(entry=>{

if(entry.found){

revealCountry(entry.name);

}

});

}

function revealCountry(name,missed=false){

const row =
document.getElementById(
`country-${name}`
);

const flag =
document.getElementById(
`flag-${name}`
);

const entry =
entries.find(
e=>e.name===name
);

if(flag){

flag.src =
`../flags/${name}.svg`;

flag.style.display =
"block";

flag.title =
name;

}

row.classList.remove(
"hidden"
);

row.classList.add(
missed
? "missed"
: "found"
);

row.innerHTML = `
<strong>${name}</strong>
<span
title="${entry.players.join("\n")}">
(${entry.count})
</span>
`;

}

input.addEventListener(
"input",
()=>{

if(gameOver) return;

const guess =
input.value
.trim()
.toLowerCase();

entries.forEach(entry=>{

if(entry.found)
return;

const country =
countryData[entry.name];

const answers = new Set();

(entry.answers || [entry.name])
.forEach(countryName=>{

answers.add(
countryName.toLowerCase()
);

const data =
countryData[countryName];

(data?.aliases || [])
.forEach(alias=>
answers.add(
alias.toLowerCase()
)
);

});



if(
answers.has(
guess
)
){

entry.found = true;

foundPlayers.add(
entry.name
);

revealCountry(
entry.name
);

const found =
entries.filter(
e=>e.found
).length;

foundCount.textContent =
found;

if(
found===entries.length
){

showWinScreen();

}

input.value="";
floatingInput.value="";

}

});

}
);

document
.getElementById(
"giveUpBtn"
)
.addEventListener(
"click",
function(){

if(gameOver) return;

if(!giveUpConfirm){

giveUpConfirm = true;

this.textContent =
"Click Again To Give Up";

setTimeout(()=>{

giveUpConfirm = false;

this.textContent =
"Give Up";

},3000);

return;

}

gameOver = true;

entries.forEach(
entry=>{

if(
!entry.found
){

revealCountry(
entry.name,
true
);

}

}
);

this.style.display =
"none";

document
.getElementById(
"tryAgainBtn"
)
.style.display =
"inline-block";

}
);

document
.getElementById(
"coachToggle"
)
.addEventListener(
"click",
function(){

includeCoaches =
!includeCoaches;

this.classList.toggle(
"active"
);

render();

}
);

function resetQuiz(){

foundPlayers.clear();

entries.forEach(
e => e.found = false
);

gameOver = false;

giveUpConfirm = false;

includeCoaches = false;

document
.getElementById(
"coachToggle"
)
.classList.remove(
"active"
);

document
.getElementById(
"winScreen"
)
.style.display =
"none";

document
.getElementById(
"giveUpBtn"
)
.style.display =
"inline-block";

document
.getElementById(
"tryAgainBtn"
)
.style.display =
"none";

input.value = "";
floatingInput.value = "";

render();

}

document
.getElementById(
"tryAgainBtn"
)
.addEventListener(
"click",
resetQuiz
);

const winTryAgain =
document.getElementById(
"winTryAgain"
);

if(winTryAgain){

winTryAgain.addEventListener(
"click",
resetQuiz
);

}

document
.getElementById(
"closeWinScreen"
)
.addEventListener(
"click",
()=>{

document
.getElementById(
"winScreen"
)
.style.display =
"none";

document
.getElementById(
"giveUpBtn"
)
.style.display =
"none";

document
.getElementById(
"tryAgainBtn"
)
.style.display =
"inline-block";

}
);

window.addEventListener(
"scroll",
()=>{

const rect =
inputRow.getBoundingClientRect();

if(rect.bottom < 0){

floatingSearch.style.display =
"block";

}else{

floatingSearch.style.display =
"none";

}

});

floatingInput.addEventListener(
"input",
()=>{

input.value =
floatingInput.value;

input.dispatchEvent(
new Event("input")
);

});

const params =
new URLSearchParams(
window.location.search
);

const major =
params.get("major");

if(!major){

document.querySelector("h1")
.textContent =
"No major selected";

throw new Error(
"No major parameter"
);

}

const majorScript =
document.createElement("script");

majorScript.src =
`majors/${major}.js`;

majorScript.onload = () => {

document.title =
majorData.title +
" - Nationalities Quiz";

document.querySelector("h1")
.textContent =
majorData.title;

teams =
majorData.teams;

render();

};

document.body.appendChild(
majorScript
);

function showWinScreen(){

gameOver = true;

document
.getElementById(
"winStats"
)
.textContent =
`${entries.length} / ${entries.length} nationalities guessed`;

document
.getElementById(
"winScreen"
)
.style.display =
"flex";

createConfetti();

}

function createConfetti(){

for(let i=0;i<150;i++){

const piece =
document.createElement("div");

piece.style.position =
"fixed";

piece.style.left =
Math.random()*100 + "vw";

piece.style.top =
"-20px";

piece.style.width =
"8px";

piece.style.height =
"8px";

piece.style.background =
`hsl(${Math.random()*360},100%,50%)`;

piece.style.zIndex =
"10001";

piece.style.pointerEvents =
"none";

document.body.appendChild(
piece
);

const duration =
3000 +
Math.random()*2000;

piece.animate(

[
{
transform:
"translateY(0)"
},
{
transform:
`translateY(110vh)
rotate(720deg)`
}
],

{
duration:
duration
}

);

setTimeout(
()=>piece.remove(),
duration
);

}

}

</script>

</body>
</html>
