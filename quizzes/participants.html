<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Major Participants Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="../teammeta.js"></script>
<script src="../players.js"></script>
<script src="../countries.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#0d1117;
color:white;
padding:30px;
}

.container{
max-width:1400px;
margin:auto;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
flex-wrap:wrap;
gap:10px;
}

.back-btn{
background:#161b22;
padding:10px 16px;
border-radius:10px;
text-decoration:none;
color:white;
font-weight:700;
}

.back-btn:hover{
background:#212936;
}

.coach-toggle{
background:#212936;
padding:10px 16px;
border-radius:10px;
cursor:pointer;
font-weight:700;
user-select:none;
}

.coach-toggle.active{
background:#238636;
}

.card{
background:linear-gradient(180deg,#1b212b,#161b22);
border:1px solid rgba(255,255,255,.05);
border-radius:18px;
padding:30px;
}

h1{
text-align:center;
font-size:40px;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#8b949e;
margin-bottom:25px;
}

.stats{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:25px;
}

.stat{
background:#212936;
padding:12px 18px;
border-radius:12px;
font-weight:700;
}

.input-row{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:30px;
flex-wrap:wrap;
}

input{
width:350px;
padding:14px;
border:none;
border-radius:12px;
background:#212936;
color:white;
font-size:16px;
outline:none;
}

.giveup-btn{
background:#da3633;
color:white;
border:none;
padding:14px 18px;
border-radius:12px;
font-weight:700;
cursor:pointer;
}

.team-header{
display:flex;
align-items:center;
gap:12px;
margin-bottom:12px;
padding-bottom:10px;
border-bottom:1px solid rgba(255,255,255,.08);
}

.team-logo{
width:36px;
height:36px;
object-fit:contain;
}

.team-name{
font-size:22px;
font-weight:700;
}

.hidden{
color:#4b5563;
letter-spacing:2px;
}

.country{
display:block;
font-size:12px;
margin-top:4px;
opacity:.8;
}

.coach{
display:block;
font-size:11px;
margin-top:4px;
color:#ffd700;
}

#teamsContainer{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(260px,1fr));
gap:20px;
margin-top:30px;
}

.team-card{
background:#182132;
border:1px solid rgba(255,255,255,.08);
border-radius:24px;
overflow:hidden;
}

.team-card-header{
display:flex;
align-items:center;
gap:10px;
padding:14px 16px;
border-bottom:1px solid rgba(255,255,255,.08);
font-weight:700;
}

.team-card-logo{
width:28px;
height:28px;
object-fit:contain;
}

.team-player-list{
padding:12px;
}

.player-row{
display:flex;
align-items:center;
gap:8px;
padding:8px 0;
font-weight:600;
}

.player-row.hidden{
justify-content:center;
color:#59657d;
letter-spacing:2px;
}

.player-row.found{
color:white;
}

.player-row.missed{
opacity:.5;
}

.player-flag{
width:18px;
height:13px;
object-fit:cover;
border-radius:2px;
}

.sub-label{
margin-left:6px;
font-size:11px;
color:#ffd700;
cursor:help;
font-weight:700;
}

#floatingSearch{
position:fixed;
top:12px;
left:50%;
transform:translateX(-50%);
z-index:9999;
display:none;
background:#182132;
padding:10px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.5);
}

#floatingInput{
width:320px;
padding:12px;
border:none;
border-radius:12px;
background:#212936;
color:white;
outline:none;
}

.tryagain-btn{
background:#238636;
color:white;
border:none;
padding:14px 18px;
border-radius:12px;
font-weight:700;
cursor:pointer;
}

#winScreen{
position:fixed;
inset:0;
background:rgba(0,0,0,.85);
display:none;
justify-content:center;
align-items:center;
z-index:10000;
backdrop-filter:blur(8px);
}

.win-content{
position:relative;
background:#182132;
padding:40px;
border-radius:24px;
text-align:center;
animation:winPop .4s ease;
box-shadow:
0 0 40px rgba(35,134,54,.4);
}

.close-win{
position:absolute;
top:10px;
right:10px;
background:none;
border:none;
color:#8b949e;
font-size:24px;
cursor:pointer;
font-weight:700;
}

.win-content h2{
font-size:42px;
margin-bottom:12px;
}

.win-content p{
color:#8b949e;
margin-bottom:20px;
font-size:18px;
}

#winTryAgain{
background:#238636;
color:white;
border:none;
padding:14px 20px;
border-radius:12px;
font-weight:700;
cursor:pointer;
}

@keyframes winPop{

from{
transform:scale(.8);
opacity:0;
}

to{
transform:scale(1);
opacity:1;
}

}

</style>
</head>
<body>

<div class="container">

<div class="topbar">

<a href="major-participants.html" class="back-btn">
← Back
</a>

<div id="coachToggle" class="coach-toggle">
Include Coaches
</div>

</div>

<div class="card">

<h1>..Loading</h1>

<div class="subtitle">
Guess every participant
</div>

<div class="stats">
<div class="stat">
Found: <span id="foundCount">0</span> /
<span id="totalCount">0</span>
</div>
</div>

<div class="input-row">

<input
id="guessInput"
placeholder="Type player name..."
autocomplete="off"
>

<button id="giveUpBtn" class="giveup-btn">
Give Up
</button>

<button
id="tryAgainBtn"
class="tryagain-btn"
style="display:none;">
Try Again
</button>

</div>

<div id="teamsContainer"></div>

<div id="floatingSearch">

<input
id="floatingInput"
placeholder="Type player name..."
autocomplete="off"
>

</div>

</div>

</div>

<div id="winScreen">

<div class="win-content">

<button
id="closeWinScreen"
class="close-win">
✕
</button>

<h2>
🏆 Major Cleared
</h2>

<p id="winStats"></p>

<button id="winTryAgain">
Try Again
</button>

</div>

</div>

<script>

let teams = [];

let includeCoaches = false;
let gameOver = false;
let giveUpConfirm = false;
let entries = [];
const foundPlayers = new Set();

const teamsContainer =
document.getElementById("teamsContainer");

const input =
document.getElementById("guessInput");

const floatingInput =
document.getElementById("floatingInput");

const inputRow =
document.querySelector(".input-row");

const floatingSearch =
document.getElementById("floatingSearch");

const foundCount =
document.getElementById("foundCount");

const totalCount =
document.getElementById("totalCount");

function buildEntries(){

entries = [];

teams.forEach(team=>{

team.players.forEach(player=>{

entries.push({
name:player.name,
aliases:player.aliases || [],
sub:player.sub || "",
team:team.team,
coach:false,
found:foundPlayers.has(player.name)
});

});

if(
includeCoaches &&
team.coach
){

if(team.coach.name !== "-"){

entries.push({
name:team.coach.name,
aliases:team.coach.aliases || [],
sub:team.coach.sub || "",
team:team.team,
coach:true,
found:foundPlayers.has(team.coach.name)
});

}

}

});

}

function render(){

buildEntries();

foundCount.textContent =
entries.filter(
e => e.found
).length;

totalCount.textContent =
entries.length;

teamsContainer.innerHTML = "";

teams.forEach(team=>{

const meta =
teamMeta[team.team] || {};

const card =
document.createElement("div");

card.className =
"team-card";

let html = `
<div class="team-card-header">

<img
class="team-card-logo"
src="../logos/${meta.logo || ''}">

<div>
${meta.fullname || team.team}
</div>

</div>

<div class="team-player-list">
`;

team.players.forEach(player=>{

html += `
<div
class="player-row hidden"
id="player-${player.name}">
?????
</div>
`;

});

if(
includeCoaches &&
team.coach &&
team.coach.name
){

if(team.coach.name === "-"){

html += `
<div class="player-row coach-row">
Coach: -
</div>
`;

}else{

html += `
<div
class="player-row hidden coach-row"
id="player-${team.coach.name}">
Coach: ?????
</div>
`;

}

}

html += `
</div>
`;

card.innerHTML = html;

teamsContainer.appendChild(card);

});

/* RE-REVEAL ALREADY FOUND PLAYERS */

entries.forEach(entry=>{

if(entry.found){

revealPlayer(entry.name);

}

});

}

function revealPlayer(name,missed=false){

const row =
document.getElementById(
`player-${name}`
);

if(!row) return;

const pdata =
playerData[name];

const country =
pdata?.country || "";

const flagName =
pdata?.flagshown || country;

const entry =
entries.find(
e => e.name === name
);

row.classList.remove(
"hidden"
);

row.classList.add(
missed
? "missed"
: "found"
);

let prefix = "";

if(entry?.coach){
prefix = "<strong>Coach:</strong> ";
}

row.innerHTML = `
${prefix}

<img
class="player-flag"
src="../flags/${flagName}.svg"
title="${flagName}">

<span>
${name}
</span>

${
entry?.sub
?
`<span
class="sub-label"
title="${name} played instead of ${entry.sub}">
SUB
</span>`
:
''
}
`;

}

input.addEventListener(
"input",
()=>{

if(gameOver) return;

const guess =
input.value
.trim()
.toLowerCase();

entries.forEach(entry=>{

if(entry.found)
return;

const answers = [

entry.name
.toLowerCase(),

...(entry.aliases || [])
.map(
a =>
a.toLowerCase()
)

];

if(
answers.includes(
guess
)
){

entry.found =
true;
foundPlayers.add(entry.name);

revealPlayer(
entry.name
);

const found =
entries.filter(
e =>
e.found
).length;

if(
found === entries.length
){

showWinScreen();

}

input.value = "";
floatingInput.value = "";

}

});

}
);

document
.getElementById(
"giveUpBtn"
)
.addEventListener(
"click",
function(){

if(gameOver) return;

if(!giveUpConfirm){

giveUpConfirm = true;

this.textContent =
"Click Again To Give Up";

setTimeout(()=>{

giveUpConfirm = false;

this.textContent =
"Give Up";

},3000);

return;

}

gameOver = true;

entries.forEach(
entry=>{

if(
!entry.found
){

revealPlayer(
entry.name,
true
);

}

}
);

this.style.display =
"none";

document
.getElementById(
"tryAgainBtn"
)
.style.display =
"inline-block";

}
);

document
.getElementById(
"coachToggle"
)
.addEventListener(
"click",
function(){

includeCoaches =
!includeCoaches;

this.classList.toggle(
"active"
);

render();

}
);

function resetQuiz(){

foundPlayers.clear();

entries.forEach(
e => e.found = false
);

gameOver = false;

giveUpConfirm = false;

includeCoaches = false;

document
.getElementById(
"coachToggle"
)
.classList.remove(
"active"
);

document
.getElementById(
"winScreen"
)
.style.display =
"none";

document
.getElementById(
"giveUpBtn"
)
.style.display =
"inline-block";

document
.getElementById(
"tryAgainBtn"
)
.style.display =
"none";

input.value = "";
floatingInput.value = "";

render();

}

document
.getElementById(
"tryAgainBtn"
)
.addEventListener(
"click",
resetQuiz
);

const winTryAgain =
document.getElementById(
"winTryAgain"
);

if(winTryAgain){

winTryAgain.addEventListener(
"click",
resetQuiz
);

}

document
.getElementById(
"closeWinScreen"
)
.addEventListener(
"click",
()=>{

document
.getElementById(
"winScreen"
)
.style.display =
"none";

document
.getElementById(
"giveUpBtn"
)
.style.display =
"none";

document
.getElementById(
"tryAgainBtn"
)
.style.display =
"inline-block";

}
);

window.addEventListener(
"scroll",
()=>{

const rect =
inputRow.getBoundingClientRect();

if(rect.bottom < 0){

floatingSearch.style.display =
"block";

}else{

floatingSearch.style.display =
"none";

}

});

floatingInput.addEventListener(
"input",
()=>{

input.value =
floatingInput.value;

input.dispatchEvent(
new Event("input")
);

});

const params =
new URLSearchParams(
window.location.search
);

const major =
params.get("major");

if(!major){

document.querySelector("h1")
.textContent =
"No major selected";

throw new Error(
"No major parameter"
);

}

const majorScript =
document.createElement("script");

majorScript.src =
`majors/${major}.js`;

majorScript.onload = () => {

document.title =
majorData.title +
" - Participants Quiz";

document.querySelector("h1")
.textContent =
majorData.title;

teams =
majorData.teams;

render();

};

document.body.appendChild(
majorScript
);

function showWinScreen(){

gameOver = true;

document
.getElementById(
"winStats"
)
.textContent =
`${entries.length} / ${entries.length} participants guessed`;

document
.getElementById(
"winScreen"
)
.style.display =
"flex";

createConfetti();

}

function createConfetti(){

for(let i=0;i<150;i++){

const piece =
document.createElement("div");

piece.style.position =
"fixed";

piece.style.left =
Math.random()*100 + "vw";

piece.style.top =
"-20px";

piece.style.width =
"8px";

piece.style.height =
"8px";

piece.style.background =
`hsl(${Math.random()*360},100%,50%)`;

piece.style.zIndex =
"10001";

piece.style.pointerEvents =
"none";

document.body.appendChild(
piece
);

const duration =
3000 +
Math.random()*2000;

piece.animate(

[
{
transform:
"translateY(0)"
},
{
transform:
`translateY(110vh)
rotate(720deg)`
}
],

{
duration:
duration
}

);

setTimeout(
()=>piece.remove(),
duration
);

}

}

</script>

</body>
</html>
